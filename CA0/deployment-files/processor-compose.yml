version: '3.8'

services:
  data-processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: data-processor
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka-broker:9092"
      KAFKA_CONSUMER_TOPIC: "sensor-data"
      KAFKA_PRODUCER_TOPIC: "processed-data"
      MONGODB_URI: "mongodb://pipeline_user:pipeline_pass_2023@mongodb-server:27017/sensordata"
      PROCESSOR_BATCH_SIZE: "10"
      PROCESSOR_INTERVAL: "5"
    volumes:
      - /opt/kafka-pipeline/logs:/app/logs
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      - kafka
      - mongodb

networks:
  default:
    external:
      name: kafka-pipeline-network